name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Read version
      id: read_version
      run: |
        VERSION=$(cat ver.txt | tr -d '\n')
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Build for Linux
      run: |
        cd yrdcdn
        go build -o yrdcdn-linux-amd64 .
        chmod +x yrdcdn-linux-amd64

    - name: Build for Windows
      run: |
        cd yrdcdn
        GOOS=windows GOARCH=amd64 go build -o yrdcdn-windows-amd64.exe .
        chmod +x yrdcdn-windows-amd64.exe

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: yrdcdn-builds
        path: |
          yrdcdn/yrdcdn-linux-amd64
          yrdcdn/yrdcdn-windows-amd64.exe

    - name: Create Release
      uses: ncipollo/release-action@v1
      with:
        tag: ${{ steps.read_version.outputs.VERSION }}
        name: ${{ steps.read_version.outputs.VERSION }}
        artifacts: |
          yrdcdn/yrdcdn-linux-amd64
          yrdcdn/yrdcdn-windows-amd64.exe
        generateReleaseNotes: true
        skipIfReleaseExists: true
        token: ${{ secrets.GITHUB_TOKEN }}